<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AskRepo v3.9 | AI Code Q&A</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <aside class="sidebar">
            <div class="logo"><i class="fas fa-code-branch"></i> AskRepo</div>
            <div class="status-box">
                <div id="status-dot" class="dot"></div>
                <span id="status-text">Disconnected</span>
            </div>
            <nav class="steps">
                <div class="step" id="step-1">1. Initialize VM</div>
                <div class="step" id="step-2">2. Setup AI</div>
                <div class="step" id="step-3">3. Index Repo</div>
            </nav>
            <div class="sidebar-actions">
                <button id="start-btn" class="btn btn-primary"><i class="fas fa-play"></i> Start Setup</button>
                <button id="terminate-btn" class="btn btn-danger" style="display:none;"><i class="fas fa-trash"></i> Kill Session</button>
            </div>
        </aside>

        <main class="content">
            <div id="setup-view" class="view">
                <div class="card terminal-card">
                    <div class="card-header">Live Output Log</div>
                    <div id="terminal" class="terminal"></div>
                </div>
                <div class="card repo-card" id="repo-config" style="display:none;">
                    <h3><i class="fab fa-github"></i> Repository</h3>
                    <div class="input-group">
                        <input type="text" id="repo-url" placeholder="username/repo" value="kushalkumarj2006/colab-orchestrator">
                        <button id="index-btn" class="btn btn-success">Clone & Index</button>
                    </div>
                </div>
            </div>

            <div id="chat-view" class="view" style="display:none;">
                <div id="chat-messages"></div>
                <div class="chat-input-row">
                    <div class="mode-selector">
                        <button class="mode-btn active" data-mode="fast">⚡ Fast</button>
                        <button class="mode-btn" data-mode="simple">💬 Simple</button>
                    </div>
                    <div class="input-wrapper">
                        <input type="text" id="chat-input" placeholder="Ask about the codebase...">
                        <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
